<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Veterans Monument - Leighton Evatt American Legion Post 365</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <!-- Site Header (consistent across pages) -->
    <header class="site-header">
      <div class="header-content">
        <a href="index.html" class="logo-link">
          <img src="Images/post365logo.png" alt="Post 365 Logo - Return to Home" class="site-logo" />
        </a>
        <h1>Leighton Evatt American Legion Post 365</h1>
      </div>
    </header>

    <main>
      <!-- Address & Contact Section -->
      <section class="content-card">
        <h2>Leighton Evatt American Legion Post 365</h2>
        <address>
          1022 Vandalia Street
          <br />
          Collinsville, IL 62234
          <br />
          Phone: 618.345.2508
        </address>
        <img src="Images/Post1.jpg" alt="Post 365 Flag Display" class="banner-image" />
        <div class="fb-contact">
          <a href="https://www.facebook.com/legionpst365" target="_blank" rel="noopener noreferrer">
            <img src="Images/facebook_logo.jpg" alt="Facebook Page" width="48" height="48" />
            Contact us on Facebook
          </a>
        </div>
      </section>

      <!-- Military Branch Flags Banner -->
      <section class="flags-banner content-card">
        <img src="Images/Military_Branch_Flags.png" alt="Military Branch Flags" class="banner-image" />
      </section>

      <!-- Veterans Monument Section -->
      <section class="content-card">
        <h2>Our Veterans Monument</h2>

        <div class="image-gallery">
          <figure>
            <img src="Memorial/Panorama1.jpg" alt="Panoramic view of the Veterans Monument" class="gallery-image" />
            <figcaption>Panoramic view of our monument</figcaption>
          </figure>

          <figure>
            <img src="Memorial/Panorama2.jpg" alt="Panoramic view of the Veterans Monument" class="gallery-image" />
            <figcaption>Panoramic view of our monument</figcaption>
          </figure>

          <figure>
            <img
              src="Memorial/Air Force.jpg"
              alt="Propeller dedicated to U.S. Air Force Veterans"
              class="gallery-image" />
            <figcaption>Propeller dedicated to all U.S. Air Force Veterans</figcaption>
          </figure>

          <figure>
            <img src="Memorial/Navy.jpg" alt="Anchor dedicated to U.S. Navy Veterans" class="gallery-image" />
            <figcaption>Anchor dedicated to all U.S. Navy Veterans</figcaption>
          </figure>

          <figure>
            <img src="Memorial/Monument1.jpg" alt="Monument dedicated to all U.S. Veterans" class="gallery-image" />
            <figcaption>Monument dedicated to all U.S. Veterans</figcaption>
          </figure>

          <figure>
            <img src="Memorial/Monument2.jpg" alt="Monument dedicated to all U.S. Veterans" class="gallery-image" />
            <figcaption>Monument dedicated to all U.S. Veterans</figcaption>
          </figure>

          <figure>
            <img src="Memorial/Stones1.jpg" alt="Stones dedicated to U.S. Veterans" class="gallery-image" />
            <figcaption>Stones dedicated to U.S. Veterans</figcaption>
          </figure>

          <figure>
            <img src="Memorial/Stones2.jpg" alt="Stones dedicated to U.S. Veterans" class="gallery-image" />
            <figcaption>Stones dedicated to U.S. Veterans</figcaption>
          </figure>
        </div>
      </section>
    </main>

    <!-- Site Footer (consistent navigation) -->
    <footer class="site-footer">
      <div class="footer-content">
        <a href="#top" class="footer-link">Back to Top ↑</a>
        <a href="index.html" class="footer-link">Return to Home</a>
      </div>
      <p>&copy; 2026 Leighton Evatt American Legion Post 365</p>
    </footer>
  </body>
</html>

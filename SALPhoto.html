<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sons of the American Legion Images - Leighton Evatt American Legion Post 365</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <!-- Site Header (consistent across pages) -->
    <header class="site-header">
      <div class="header-content">
        <a href="index.html" class="logo-link">
          <img src="Images/post365logo.png" alt="Post 365 Logo - Return to Home" class="site-logo" />
        </a>
        <h1>Leighton Evatt American Legion Post 365</h1>
      </div>
    </header>

    <main>
      <!-- Address & Contact Section -->
      <section class="content-card">
        <h2>Leighton Evatt American Legion Post 365</h2>
        <address>
          1022 Vandalia Street
          <br />
          Collinsville, IL 62234
          <br />
          Phone: 618.345.2508
        </address>
        <img src="Images/Post1.jpg" alt="Post 365 Flag Display" class="banner-image" />
        <div class="fb-contact">
          <a href="https://www.facebook.com/legionpst365" target="_blank" rel="noopener noreferrer">
            <img src="Images/facebook_logo.jpg" alt="Facebook Page" width="48" height="48" />
            Contact us on Facebook
          </a>
        </div>
      </section>

      <!-- SAL Images Gallery -->
      <section class="content-card">
        <h2>Sons of the American Legion - Images</h2>

        <div class="image-gallery">
          <figure>
            <img
              src="Images/SALImages/0412181815.jpg"
              alt="SAL members frying up their World Famous Pork Rinds"
              class="gallery-image" />
            <figcaption>SAL members frying up their World Famous Pork Rinds</figcaption>
          </figure>

          <figure>
            <img
              src="Images/SALImages/0412181830.jpg"
              alt="Guy Lawrence hard at work at the fryer"
              class="gallery-image" />
            <figcaption>Guy Lawrence hard at work at the fryer</figcaption>
          </figure>
        </div>
      </section>

      <!-- Military Branch Flags Banner (consistent across pages) -->
      <section class="flags-banner content-card">
        <img src="Images/Military_Branch_Flags.png" alt="Military Branch Flags" class="banner-image" />
      </section>
    </main>

    <!-- Site Footer (consistent navigation) -->
    <footer class="site-footer">
      <div class="footer-content">
        <a href="#top" class="footer-link">Back to Top ↑</a>
        <a href="index.html" class="footer-link">Return to Home</a>
      </div>
      <p>&copy; 2026 Leighton Evatt American Legion Post 365</p>
    </footer>
  </body>
</html>
